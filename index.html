<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jogador Bom de Nota</title>    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="login-box">
        <h2>LOGIN</h2>
        <p class="desc">Acesse o sistema Jogador Bom de Nota, Bom de Bola</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                    <i class="fa-regular fa-eye-slash toggle-password" onclick="togglePassword('senha', this)"></i>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-entrar">Entrar</button>
                <a href="recuperar.html" class="forgot-password">Esqueceu a senha?</a>
            </div>
            
            <div class="create-account">
                <a href="cadastro.html">Não tem conta? Criar uma conta</a>
            </div>
        </form>
    </div>

    <script>
        // Registro do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("PWA: Service Worker Registrado!"))
            .catch(err => console.log("PWA: Erro no registro", err));
        }

        // Função para mostrar/esconder senha (Risco = Escondido / Sem Risco = Visível)
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            }
        }

        // Lógica de Autenticação
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailLogin = document.getElementById('email').value;
            const senhaLogin = document.getElementById('senha').value;

            // Busca os usuários cadastrados no LocalStorage
            const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];

            // Validação (RF11 - Controle de Acesso)
            const usuarioValidado = usuarios.find(u => u.email === emailLogin && u.senha === senhaLogin);

            if (usuarioValidado) {
                // Salva o usuário na sessão para identificar quem entrou
                sessionStorage.setItem('usuarioLogado', JSON.stringify(usuarioValidado));
                // ALTERAÇÃO AQUI: Certifique-se de que o nome do arquivo da dashboard seja painel.html
                window.location.href = 'painel.html'; 
            } else {
                alert("E-mail ou senha incorretos!");
            }
        });
    </script>
</body>
</html>
